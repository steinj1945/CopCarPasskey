name: Web Portal

on:
  push:
    branches: [main]
    paths: ["web/portal/**", ".github/workflows/portal.yml"]
  pull_request:
    branches: [main]
    paths: ["web/portal/**", ".github/workflows/portal.yml"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Switch to 'npm ci' once package-lock.json is committed
          # cache: "npm"
          # cache-dependency-path: web/portal/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Point the portal at the API — override in repo secrets for each env
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portal-dist
          path: web/portal/dist/
          retention-days: 7

