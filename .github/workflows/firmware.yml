name: ESP32 Firmware

on:
  push:
    branches: [main]
    paths: ["system/**", ".github/workflows/firmware.yml"]
  pull_request:
    branches: [main]
    paths: ["system/**", ".github/workflows/firmware.yml"]

env:
  # Target board — change to match your specific ESP32 variant:
  #   esp32:esp32:esp32        — generic ESP32 Dev Module
  #   esp32:esp32:esp32s3      — ESP32-S3
  #   esp32:esp32:esp32c3      — ESP32-C3
  FQBN: esp32:esp32:esp32
  ESP32_INDEX_URL: https://espressif.github.io/arduino-esp32/package_esp32_index.json

jobs:
  compile:
    name: Compile sketches
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v1

      - name: Update core index
        run: |
          arduino-cli core update-index \
            --additional-urls "${{ env.ESP32_INDEX_URL }}"

      - name: Install ESP32 core
        run: |
          arduino-cli core install esp32:esp32 \
            --additional-urls "${{ env.ESP32_INDEX_URL }}"

      - name: Compile PasskeyLock
        run: |
          arduino-cli compile \
            --fqbn "${{ env.FQBN }}" \
            --output-dir firmware-out/ \
            --warnings all \
            system/PasskeyLock/

      - name: Compile Provisioning
        run: |
          arduino-cli compile \
            --fqbn "${{ env.FQBN }}" \
            --output-dir provisioning-out/ \
            system/Provisioning/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            firmware-out/PasskeyLock.ino.bin
            firmware-out/PasskeyLock.ino.elf
            provisioning-out/Provisioning.ino.bin
          retention-days: 30

      # ── Optional: attach firmware to a GitHub Release ─────────────
      # Trigger a release by pushing a tag: git tag v1.0.0 && git push --tags
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware-out/PasskeyLock.ino.bin
            provisioning-out/Provisioning.ino.bin
